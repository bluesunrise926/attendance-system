<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>員工打卡系統</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

  <!-- 載入畫面 -->
  <div id="loadingScreen" class="screen active">
    <div class="loading-container">
      <div class="loading-logo">⏰</div>
      <div class="loading-text">員工打卡系統</div>
      <div class="loading-spinner"></div>
      <div class="loading-sub" id="loadingMsg">正在連線...</div>
    </div>
  </div>

  <!-- 登入畫面 -->
  <div id="loginScreen" class="screen">
    <div class="login-bg"></div>
    <div class="login-container">
      <div class="logo">
        <div class="logo-icon">⏰</div>
        <h1>員工打卡系統</h1>
        <p class="subtitle">符合台灣勞基法出勤記錄規定</p>
      </div>
      <div class="login-card">
        <div class="form-group">
          <label>電子郵件</label>
          <input type="email" id="loginEmail" placeholder="請輸入電子郵件" autocomplete="email">
        </div>
        <div class="form-group">
          <label>密碼</label>
          <input type="password" id="loginPassword" placeholder="請輸入密碼" autocomplete="current-password">
        </div>
        <div id="loginError" class="error-msg" style="display:none;"></div>
        <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">登入</button>
      </div>
      <p class="login-hint">系統由管理員建立帳號，如有問題請聯絡管理員</p>
    </div>
  </div>

  <!-- 員工打卡畫面 -->
  <div id="employeeScreen" class="screen">
    <div class="top-bar">
      <div class="user-info">
        <div class="user-avatar" id="userAvatarEmp">員</div>
        <div>
          <div class="user-name" id="userNameEmp">員工姓名</div>
          <div class="user-dept" id="userDeptEmp">部門</div>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="handleLogout()">登出</button>
    </div>

    <div class="clock-section">
      <div class="time-display" id="currentTime">00:00:00</div>
      <div class="date-display" id="currentDate"></div>
    </div>

    <div class="gps-bar">
      <span id="gpsIcon">📍</span>
      <span id="gpsText">正在取得位置...</span>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-icon" id="statusIcon">📋</div>
      <div class="status-text" id="statusText">今日尚未打卡</div>
      <div class="status-sub" id="statusSub"></div>
    </div>

    <div class="punch-buttons">
      <button class="punch-btn punch-in" id="btnIn" onclick="doClock('in')">
        <span class="punch-icon">🟢</span>
        <span class="punch-label">上班打卡</span>
      </button>
      <button class="punch-btn punch-out" id="btnOut" onclick="doClock('out')" disabled>
        <span class="punch-icon">🔴</span>
        <span class="punch-label">下班打卡</span>
      </button>
    </div>

    <div class="today-summary" id="todaySummary" style="display:none;">
      <div class="summary-row"><span>上班時間</span><span id="sumIn">--:--</span></div>
      <div class="summary-row"><span>下班時間</span><span id="sumOut">--:--</span></div>
      <div class="summary-row"><span>工作時數</span><span id="sumHours">--</span></div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" onclick="showMyRecords()">📊 出勤記錄</button>
    </div>
  </div>

  <!-- 員工出勤記錄 Modal -->
  <div id="myRecordsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>我的出勤記錄</h3>
        <button onclick="document.getElementById('myRecordsModal').style.display='none'">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <select id="myMonthSel" onchange="loadMyRecords()"></select>
        </div>
        <div id="myRecordsList"></div>
      </div>
    </div>
  </div>

  <!-- 管理員後台 -->
  <div id="adminScreen" class="screen">
    <div class="top-bar">
      <div class="user-info">
        <div class="user-avatar admin-avatar">管</div>
        <div>
          <div class="user-name">管理員後台</div>
          <div class="user-dept" id="dashDate"></div>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="handleLogout()">登出</button>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('tabDash', this)">今日總覽</button>
      <button class="tab-btn" onclick="switchTab('tabRecords', this)">出勤記錄</button>
      <button class="tab-btn" onclick="switchTab('tabEmp', this)">員工管理</button>
      <button class="tab-btn" onclick="switchTab('tabSettings', this)">系統設定</button>
    </div>

    <!-- 今日總覽 -->
    <div id="tabDash" class="tab-panel active">
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-num" id="kpiTotal">0</div><div class="kpi-label">員工總數</div></div>
        <div class="kpi-card kpi-green"><div class="kpi-num" id="kpiPresent">0</div><div class="kpi-label">上班中</div></div>
        <div class="kpi-card kpi-blue"><div class="kpi-num" id="kpiLeft">0</div><div class="kpi-label">已下班</div></div>
        <div class="kpi-card kpi-red"><div class="kpi-num" id="kpiAbsent">0</div><div class="kpi-label">未打卡</div></div>
      </div>
      <div class="section-title">今日出勤狀況</div>
      <div class="table-wrap">
        <table class="dt">
          <thead><tr><th>姓名</th><th>部門</th><th>上班</th><th>下班</th><th>工時</th><th>狀態</th></tr></thead>
          <tbody id="dashBody"><tr><td colspan="6" class="empty-row">載入中...</td></tr></tbody>
        </table>
      </div>
      <button class="btn btn-outline" style="margin-top:12px;" onclick="loadDashboard()">🔄 重新整理</button>
    </div>

    <!-- 出勤記錄 -->
    <div id="tabRecords" class="tab-panel">
      <div class="filter-bar">
        <select id="recMonth" onchange="loadRecords()"></select>
        <select id="recEmp" onchange="loadRecords()"><option value="">全部員工</option></select>
        <button class="btn btn-sm btn-primary" onclick="exportCSV()">匯出 CSV</button>
      </div>
      <div class="table-wrap">
        <table class="dt">
          <thead><tr><th>日期</th><th>姓名</th><th>部門/身份</th><th>上班</th><th>下班</th><th>工時</th><th>位置</th><th>截圖</th><th>備註</th></tr></thead>
          <tbody id="recBody"><tr><td colspan="9" class="empty-row">請選擇月份</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 員工管理 -->
    <div id="tabEmp" class="tab-panel">
      <div class="section-title">新增員工</div>
      <div class="add-emp-form">
        <div class="form-row">
          <input type="text" id="newEmpName" placeholder="姓名 *">
          <input type="email" id="newEmpEmail" placeholder="電子郵件 *">
        </div>
        <div class="form-row">
          <input type="password" id="newEmpPwd" placeholder="初始密碼 *">
          <input type="text" id="newEmpDept" placeholder="部門">
        </div>
        <div class="form-row">
          <select id="newEmpRole" style="flex:1;padding:10px;border-radius:8px;border:1px solid #333;background:#16213e;color:#e0e0e0;font-size:15px;">
            <option value="employee">正職員工</option>
            <option value="parttime">工讀生</option>
          </select>
          <input type="date" id="newEmpJoin" placeholder="到職日">
        </div>
        <div id="addEmpError" class="error-msg" style="display:none;"></div>
        <button class="btn btn-primary" onclick="createEmployee()">新增員工</button>
      </div>
      <div class="section-title" style="margin-top:20px;">員工列表</div>
      <div class="table-wrap">
        <table class="dt">
          <thead><tr><th>姓名</th><th>Email</th><th>部門</th><th>角色</th><th>到職日</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="empBody"><tr><td colspan="7" class="empty-row">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 系統設定 -->
    <div id="tabSettings" class="tab-panel">
      <div class="section-title">打卡地點設定</div>
      <div class="settings-form">
        <div class="form-group">
          <label>地點名稱</label>
          <input type="text" id="setLocName" placeholder="例：公司總部">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>緯度</label>
            <input type="number" id="setLat" step="0.000001" placeholder="25.033964">
          </div>
          <div class="form-group">
            <label>經度</label>
            <input type="number" id="setLng" step="0.000001" placeholder="121.564468">
          </div>
        </div>
        <div class="form-group">
          <label>允許範圍（公尺）</label>
          <input type="number" id="setRadius" placeholder="200">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>上班時間</label>
            <input type="time" id="setWorkStart">
          </div>
          <div class="form-group">
            <label>下班時間</label>
            <input type="time" id="setWorkEnd">
          </div>
        </div>
        <div id="settingsMsg" class="error-msg" style="display:none;"></div>
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="toast"></div>

  <!-- 主程式（單一 module，包含所有邏輯） -->
  <script type="module" src="app.js"></script>

  <!-- PWA Service Worker 註冊 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('Service Worker 註冊成功'))
          .catch(e => console.warn('Service Worker 註冊失敗:', e));
      });
    }
  </script>

</body>
</html>
